<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="cursor"></div>

<!-- Header loads here -->
<div id="header"></div>

<main>

<section id="about">
  <h2>About</h2>
  <p>[Your Summary]</p>
</section>

<section id="experience">
  <h2>Experience</h2>
  <ul>
    <li><b>[Job Title]</b> at [Company] — [Year]<br>[Achievement]</li>
    <li><b>[Job Title]</b> at [Company] — [Year]<br>[Achievement]</li>
  </ul>
</section>

<section id="skills">
  <h2>Skills</h2>

  <div class="skill">
    <p>JavaScript</p>
    <div class="bar"><div class="bar-fill" data-width="90%"></div></div>
  </div>

  <div class="skill">
    <p>Python</p>
    <div class="bar"><div class="bar-fill" data-width="85%"></div></div>
  </div>

</section>

<section id="projects">
  <h2>Projects</h2>
  <ul>
    <li><b>[Project]</b> — Description <a href="#">View</a></li>
    <li><b>[Project]</b> — Description <a href="#">View</a></li>
  </ul>
</section>

<section id="education">
  <h2>Education</h2>
  <p>[Degree, University]</p>
</section>

</main>

<script src="script.js"></script>
</body>
</html>
